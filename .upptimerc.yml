# Change these first
owner: nanorocks # Your GitHub organization or username, where this repository lives
repo: uptime-tool # The name of this repository

sites:
  - name: Deliciopz
    url: https://deliciopz.com
  - name: Delicio Beebistro
    url: http://delicio.beebistro.mk
  - name: Beebistro
    url: http://beebistro.mk
  - name: Beebistro Support
    url: https://support.beebistro.mk
  - name: Nankov
    url: http://nankov.mk
  - name: Velogs
    url: https://velogs.app
  - name: Velogs Test
    url: https://test.velogs.app

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: custom-domain.com
  baseUrl: /uptime-tool
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/logo.svg
  name: Uptime Monitor
  introTitle: "Uptime Monitor"
  introMessage: Real-time uptime monitoring for nanorocks projects
  favicon: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/favicon.svg
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/nanorocks/uptime-tool

# Commit messages configuration
commitMessages:
  commitAuthorName: "Upptime Bot"
  commitAuthorEmail: "bot@upptime.js.org"
  commitType: ":rocket:"
  readmeContent: "\n[📈 Live Status](https://nanorocks.github.io/uptime-tool): <!-- summary_status_autogen_start -->\n<!-- summary_status_autogen_end -->"
  commitAutocorrect: false
  rollbackAutoCommit: true

# General configuration
commitPrefix: "[Automated]"
skipHomepageOnlyUpdates: true
assignees:
  - nanorocks
labels:
  - "status"
  - "uptime"

# Check interval (in minutes)
interval: 5

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
